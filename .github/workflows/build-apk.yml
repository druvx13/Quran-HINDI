name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (signed)
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/quran-hindi-release.jks
          KEYSTORE_PASSWORD: quranhindipass
          KEY_ALIAS: quran-hindi
          KEY_PASSWORD: quranhindipass
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: quran-hindi-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: quran-hindi-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
